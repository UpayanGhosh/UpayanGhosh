<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220" role="img" aria-label="About Upayan">
  <title>About — Upayan Ghosh</title>
  <defs>
    <linearGradient id="aBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="aAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9F6BF5"/>
      <stop offset="100%" stop-color="#c9b8ff"/>
    </linearGradient>
    <filter id="aShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="aGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style><![CDATA[
    @keyframes float-up {
      0%,100% { transform: translate(0,0); opacity: 0.4; }
      50% { transform: translate(3px,-6px); opacity: 0.9; }
    }
    @keyframes pulse-icon {
      0%,100% { opacity: 0.7; }
      50% { opacity: 1; }
    }
    @keyframes rotate-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .label { font-family: 'Fira Code','Courier New',monospace; font-size: 12px; font-weight: 600; fill: #9F6BF5; text-transform: uppercase; letter-spacing: 1px; }
    .value { font-family: 'Segoe UI',sans-serif; font-size: 15px; fill: #e4d9ff; }
    .title { font-family: 'Segoe UI','SF Pro Display',sans-serif; font-size: 26px; font-weight: 700; fill: url(#aAccent); }
    .p { fill: #9F6BF5; animation: float-up 3s ease-in-out infinite; }
    .icon { fill: #9F6BF5; animation: pulse-icon 2.5s ease-in-out infinite; }
    .ring-slow { fill: none; stroke: #6E40C9; stroke-width: 1; stroke-dasharray: 3 5; animation: rotate-slow 30s linear infinite; transform-origin: 100px 110px; opacity: 0.5; }
  ]]></style>

  <!-- Background -->
  <rect x="4" y="4" width="1192" height="212" rx="20" ry="20" fill="url(#aBg)" filter="url(#aShadow)"/>
  <rect x="4" y="4" width="1192" height="212" rx="20" ry="20" fill="none" stroke="#9F6BF5" stroke-width="1.5" opacity="0.4"/>

  <!-- Left accent stripe -->
  <rect x="4" y="4" width="5" height="212" rx="2" fill="url(#aAccent)"/>

  <!-- Floating particles -->
  <circle class="p" cx="1100" cy="30" r="2"/>
  <circle class="p" cx="1140" cy="60" r="1.5" style="animation-delay: 0.5s"/>
  <circle class="p" cx="1080" cy="170" r="2.5" style="animation-delay: 1s"/>
  <circle class="p" cx="1150" cy="140" r="2" style="animation-delay: 1.5s"/>
  <circle class="p" cx="1060" cy="60" r="1.5" style="animation-delay: 0.8s"/>
  <circle class="p" cx="1120" cy="180" r="2" style="animation-delay: 1.2s"/>

  <!-- Avatar placeholder (stylized) -->
  <g transform="translate(100, 110)">
    <circle class="ring-slow" cx="0" cy="0" r="65"/>
    <circle cx="0" cy="0" r="52" fill="#1a1040" stroke="#9F6BF5" stroke-width="2" filter="url(#aGlow)"/>
    <!-- Head -->
    <circle cx="0" cy="-10" r="18" fill="#c9b8ff" opacity="0.9"/>
    <!-- Shoulders / body curve -->
    <path d="M -30 30 Q -30 10 0 10 Q 30 10 30 30 L 30 45 L -30 45 Z" fill="#c9b8ff" opacity="0.9"/>
    <!-- Pulsing glow ring -->
    <circle cx="0" cy="0" r="48" fill="none" stroke="#9F6BF5" stroke-width="1" opacity="0.3" class="icon"/>
  </g>

  <!-- Main title -->
  <text class="title" x="200" y="60">Upayan Ghosh</text>
  <text class="label" x="200" y="80" style="font-size: 13px; text-transform: none; letter-spacing: 0;">AI Systems Engineer · Builder · Kolkata, India</text>

  <!-- Info grid -->
  <g transform="translate(200, 110)">
    <!-- Row 1 -->
    <g>
      <!-- icon briefcase -->
      <rect x="0" y="0" width="16" height="12" rx="2" fill="none" stroke="#9F6BF5" stroke-width="1.5"/>
      <rect x="5" y="-3" width="6" height="3" rx="1" fill="none" stroke="#9F6BF5" stroke-width="1.5"/>
      <text class="label" x="24" y="10">DAY JOB</text>
      <text class="value" x="110" y="11">Application Dev Analyst @ Accenture</text>
    </g>

    <!-- Row 2 -->
    <g transform="translate(0, 28)">
      <!-- icon code brackets -->
      <path d="M 6 0 L 0 6 L 6 12 M 10 0 L 16 6 L 10 12" fill="none" stroke="#9F6BF5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text class="label" x="24" y="10">NIGHTS</text>
      <text class="value" x="110" y="11">Building open-source AI systems</text>
    </g>

    <!-- Row 3 -->
    <g transform="translate(0, 56)">
      <!-- icon target -->
      <circle cx="8" cy="6" r="6" fill="none" stroke="#9F6BF5" stroke-width="1.5"/>
      <circle cx="8" cy="6" r="3" fill="none" stroke="#9F6BF5" stroke-width="1.5"/>
      <circle cx="8" cy="6" r="1" fill="#9F6BF5"/>
      <text class="label" x="24" y="10">FOCUS</text>
      <text class="value" x="110" y="11">Systems that remember · route · explain themselves</text>
    </g>

    <!-- Row 4 -->
    <g transform="translate(0, 84)">
      <!-- icon star -->
      <path d="M 8 0 L 10 5 L 15 5 L 11 8 L 13 13 L 8 10 L 3 13 L 5 8 L 1 5 L 6 5 Z" fill="#9F6BF5"/>
      <text class="label" x="24" y="10">MOTTO</text>
      <text class="value" x="110" y="11">Use every tool available. Ship what matters.</text>
    </g>
  </g>

  <!-- Right side stats cluster -->
  <g transform="translate(860, 60)">
    <!-- Stat block -->
    <rect x="0" y="0" width="300" height="120" rx="12" fill="rgba(159,107,245,0.08)" stroke="#6E40C9" stroke-width="1" stroke-dasharray="4 4"/>

    <text class="label" x="15" y="25">CURRENTLY</text>
    <text class="value" x="15" y="48" style="font-size: 13px;">▸ Working with LanceDB &amp; Claude Code</text>
    <text class="value" x="15" y="68" style="font-size: 13px;">▸ Shipping claude-jarvis updates</text>
    <text class="value" x="15" y="88" style="font-size: 13px;">▸ 3 active OSS projects</text>
    <text class="value" x="15" y="108" style="font-size: 13px;">▸ Building AI that remembers</text>
  </g>
</svg>
