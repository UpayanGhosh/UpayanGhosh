<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-label="What I Care About">
  <title>What I Care About — Engineering Principles</title>
  <defs>
    <linearGradient id="phBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="phAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9F6BF5"/>
      <stop offset="100%" stop-color="#c9b8ff"/>
    </linearGradient>
    <linearGradient id="phCardBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(159,107,245,0.10)"/>
      <stop offset="100%" stop-color="rgba(159,107,245,0.03)"/>
    </linearGradient>
    <filter id="phShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="phGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style><![CDATA[
    .card-title {
      font-family: 'Segoe UI', 'SF Pro Display', 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 700;
      fill: #c9b8ff;
      letter-spacing: 1px;
    }
    .card-subtitle {
      font-family: 'Segoe UI', 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      fill: #8a7fb0;
      letter-spacing: 1px;
    }
    .number {
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      font-weight: 700;
      fill: #9F6BF5;
      letter-spacing: 1px;
    }
    .principle-title {
      font-family: 'Segoe UI', 'SF Pro Display', 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 700;
      fill: #ffffff;
      letter-spacing: 0.3px;
    }
    .principle-body {
      font-family: 'Segoe UI', 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 400;
      fill: #c9b8ff;
    }
    .divider {
      stroke: #9F6BF5;
      stroke-width: 1;
      opacity: 0.3;
    }

    @keyframes icon-pulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    .icon-pulse { animation: icon-pulse 3s ease-in-out infinite; }

    @keyframes float-p {
      0%, 100% { transform: translate(0,0); opacity: 0.3; }
      50% { transform: translate(4px,-8px); opacity: 0.8; }
    }
    .p { animation: float-p 4s ease-in-out infinite; fill: #9F6BF5; }

    .icon-stroke { stroke: #9F6BF5; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    .icon-fill { fill: #9F6BF5; }
  ]]></style>

  <!-- Card background -->
  <rect x="4" y="4" width="1192" height="332" rx="20" ry="20" fill="url(#phBg)" filter="url(#phShadow)"/>
  <rect x="4" y="4" width="1192" height="332" rx="20" ry="20" fill="none" stroke="#9F6BF5" stroke-width="1.5" opacity="0.4"/>

  <!-- Accent stripe -->
  <rect x="4" y="4" width="5" height="332" rx="2" fill="url(#phAccent)"/>

  <!-- Card header -->
  <text class="card-title" x="40" y="45">WHAT I CARE ABOUT</text>
  <text class="card-subtitle" x="40" y="68">ENGINEERING PRINCIPLES · GUIDED BY CONSTRAINTS</text>

  <!-- Divider -->
  <line class="divider" x1="40" y1="85" x2="1160" y2="85"/>

  <!-- Floating particles -->
  <circle class="p" cx="1140" cy="30" r="2"/>
  <circle class="p" cx="1100" cy="50" r="1.5" style="animation-delay: 0.5s"/>
  <circle class="p" cx="50" cy="310" r="2" style="animation-delay: 1s"/>
  <circle class="p" cx="1150" cy="300" r="1.8" style="animation-delay: 1.3s"/>

  <!-- ============== 5 PRINCIPLES (clean grid) ============== -->

  <!-- 01 MEMORY -->
  <g transform="translate(70, 120)">
    <text class="number" x="0" y="0">01</text>
    <!-- Memory chip icon -->
    <g class="icon-pulse" transform="translate(0, 18)">
      <rect class="icon-stroke" x="0" y="0" width="28" height="28" rx="3"/>
      <rect x="6" y="6" width="16" height="16" rx="1" fill="#9F6BF5" opacity="0.3"/>
      <line class="icon-stroke" x1="-4" y1="8" x2="0" y2="8"/>
      <line class="icon-stroke" x1="-4" y1="14" x2="0" y2="14"/>
      <line class="icon-stroke" x1="-4" y1="20" x2="0" y2="20"/>
      <line class="icon-stroke" x1="28" y1="8" x2="32" y2="8"/>
      <line class="icon-stroke" x1="28" y1="14" x2="32" y2="14"/>
      <line class="icon-stroke" x1="28" y1="20" x2="32" y2="20"/>
    </g>
    <text class="principle-title" x="0" y="80">MEMORY</text>
    <line class="divider" x1="0" y1="90" x2="60" y2="90" style="opacity: 0.6"/>
    <text class="principle-body" x="0" y="110">Systems that remember —</text>
    <text class="principle-body" x="0" y="126">not just respond.</text>
    <text class="principle-body" x="0" y="150" style="font-style: italic; opacity: 0.7">Context is everything.</text>
  </g>

  <!-- 02 ADAPTIVE -->
  <g transform="translate(290, 120)">
    <text class="number" x="0" y="0">02</text>
    <!-- Compass icon -->
    <g class="icon-pulse" transform="translate(0, 18)" style="animation-delay: 0.3s">
      <circle class="icon-stroke" cx="14" cy="14" r="13"/>
      <path class="icon-stroke" d="M 14 4 L 18 14 L 14 24 L 10 14 Z" fill="#9F6BF5" fill-opacity="0.3"/>
      <circle class="icon-fill" cx="14" cy="14" r="2"/>
    </g>
    <text class="principle-title" x="0" y="80">ADAPTIVE</text>
    <line class="divider" x1="0" y1="90" x2="70" y2="90" style="opacity: 0.6"/>
    <text class="principle-body" x="0" y="110">AI that adapts to the user,</text>
    <text class="principle-body" x="0" y="126">not the other way around.</text>
    <text class="principle-body" x="0" y="150" style="font-style: italic; opacity: 0.7">Personalization over prescription.</text>
  </g>

  <!-- 03 PRIVACY -->
  <g transform="translate(530, 120)">
    <text class="number" x="0" y="0">03</text>
    <!-- Lock icon -->
    <g class="icon-pulse" transform="translate(0, 18)" style="animation-delay: 0.6s">
      <rect class="icon-stroke" x="2" y="12" width="24" height="18" rx="2"/>
      <path class="icon-stroke" d="M 7 12 L 7 7 Q 7 -1 14 -1 Q 21 -1 21 7 L 21 12"/>
      <circle class="icon-fill" cx="14" cy="21" r="2"/>
      <line class="icon-stroke" x1="14" y1="21" x2="14" y2="26"/>
    </g>
    <text class="principle-title" x="0" y="80">PRIVACY</text>
    <line class="divider" x1="0" y1="90" x2="60" y2="90" style="opacity: 0.6"/>
    <text class="principle-body" x="0" y="110">Your data stays on your</text>
    <text class="principle-body" x="0" y="126">own machine. Always.</text>
    <text class="principle-body" x="0" y="150" style="font-style: italic; opacity: 0.7">Zero cloud leakage.</text>
  </g>

  <!-- 04 CONSTRAINTS -->
  <g transform="translate(760, 120)">
    <text class="number" x="0" y="0">04</text>
    <!-- Wrench icon -->
    <g class="icon-pulse" transform="translate(0, 18)" style="animation-delay: 0.9s">
      <path class="icon-stroke" d="M 20 4 Q 28 4 28 12 Q 28 18 22 20 L 8 26 Q 4 28 2 26 Q 0 24 2 20 L 14 10 Q 12 4 20 4 Z" fill="#9F6BF5" fill-opacity="0.2"/>
      <circle class="icon-fill" cx="4" cy="24" r="1.5"/>
    </g>
    <text class="principle-title" x="0" y="80">CONSTRAINTS</text>
    <line class="divider" x1="0" y1="90" x2="90" y2="90" style="opacity: 0.6"/>
    <text class="principle-body" x="0" y="110">Make it work on consumer</text>
    <text class="principle-body" x="0" y="126">hardware. No GPU clusters.</text>
    <text class="principle-body" x="0" y="150" style="font-style: italic; opacity: 0.7">Accessible by design.</text>
  </g>

  <!-- 05 EVERY TOOL -->
  <g transform="translate(990, 120)">
    <text class="number" x="0" y="0">05</text>
    <!-- Stacked tools icon -->
    <g class="icon-pulse" transform="translate(0, 18)" style="animation-delay: 1.2s">
      <rect class="icon-stroke" x="2" y="2" width="12" height="12" rx="1"/>
      <rect class="icon-stroke" x="16" y="2" width="12" height="12" rx="1" fill="#9F6BF5" fill-opacity="0.3"/>
      <rect class="icon-stroke" x="2" y="16" width="12" height="12" rx="1" fill="#9F6BF5" fill-opacity="0.3"/>
      <rect class="icon-stroke" x="16" y="16" width="12" height="12" rx="1"/>
    </g>
    <text class="principle-title" x="0" y="80">EVERY TOOL</text>
    <line class="divider" x1="0" y1="90" x2="80" y2="90" style="opacity: 0.6"/>
    <text class="principle-body" x="0" y="110">Use every tool available —</text>
    <text class="principle-body" x="0" y="126">including AI — to ship better.</text>
    <text class="principle-body" x="0" y="150" style="font-style: italic; opacity: 0.7">Pragmatism wins.</text>
  </g>

  <!-- Bottom tag line -->
  <line class="divider" x1="40" y1="290" x2="1160" y2="290"/>
  <text class="card-subtitle" x="600" y="315" text-anchor="middle" style="font-size: 11px;">CONSTRAINT-DRIVEN · PRIVACY-FIRST · HUMAN-CENTERED · ALWAYS SHIPPING</text>
</svg>
