<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" width="1200" height="420" role="img" aria-label="Tech Stack">
  <title>Tech Stack — what I build with</title>
  <defs>
    <linearGradient id="stBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1040"/>
    </linearGradient>
    <linearGradient id="stAiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9F6BF5"/>
      <stop offset="100%" stop-color="#c9b8ff"/>
    </linearGradient>
    <linearGradient id="stWebGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#a8d6ff"/>
    </linearGradient>
    <linearGradient id="stPastGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3FB950"/>
      <stop offset="100%" stop-color="#a8e6b0"/>
    </linearGradient>
    <filter id="stShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="stGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style><![CDATA[
    .section-label {
      font-family: 'Caveat', 'Kalam', 'Bradley Hand', 'Segoe Script', cursive;
      font-size: 32px;
      font-weight: 700;
    }
    .section-ai { fill: url(#stAiGrad); }
    .section-web { fill: url(#stWebGrad); }
    .section-past { fill: url(#stPastGrad); }

    .chip-text {
      font-family: 'Segoe UI', 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      fill: #e4d9ff;
    }
    .note {
      font-family: 'Caveat', 'Kalam', 'Segoe Script', cursive;
      font-size: 20px;
      font-weight: 700;
      fill: #FFE066;
    }
    .card-title {
      font-family: 'Segoe UI', 'Inter', sans-serif;
      font-size: 22px;
      font-weight: 700;
      fill: #c9b8ff;
      letter-spacing: 1px;
    }

    @keyframes hover-chip {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    .chip {
      fill: rgba(159,107,245,0.12);
      stroke-width: 1.5;
      transform-origin: center;
    }
    .chip-ai { stroke: #9F6BF5; }
    .chip-web { stroke: #58A6FF; }
    .chip-past { stroke: #3FB950; }

    @keyframes float-p {
      0%, 100% { transform: translate(0,0); opacity: 0.3; }
      50% { transform: translate(4px,-8px); opacity: 0.8; }
    }
    .p { animation: float-p 3.5s ease-in-out infinite; fill: #9F6BF5; }

    @keyframes underline-sweep {
      0%, 100% { stroke-dashoffset: 0; }
      50% { stroke-dashoffset: -20; }
    }
    .hand-underline {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 4 3;
      animation: underline-sweep 4s linear infinite;
    }
    .ul-ai { stroke: #9F6BF5; }
    .ul-web { stroke: #58A6FF; }
    .ul-past { stroke: #3FB950; }
  ]]></style>

  <!-- Card background -->
  <rect x="4" y="4" width="1192" height="412" rx="20" ry="20" fill="url(#stBg)" filter="url(#stShadow)"/>
  <rect x="4" y="4" width="1192" height="412" rx="20" ry="20" fill="none" stroke="#9F6BF5" stroke-width="1.5" opacity="0.4"/>

  <!-- Accent left stripe -->
  <rect x="4" y="4" width="5" height="412" rx="2" fill="#9F6BF5"/>

  <!-- Card header -->
  <text class="card-title" x="40" y="45">TECH STACK</text>
  <text class="card-subtitle" x="40" y="68" style="font-family: 'Segoe UI', sans-serif; font-size: 13px; fill: #8a7fb0; letter-spacing: 1px;">WHAT I BUILD WITH</text>

  <!-- Divider under title -->
  <line x1="40" y1="60" x2="1160" y2="60" stroke="#9F6BF5" stroke-width="1" opacity="0.2"/>

  <!-- Floating particles -->
  <circle class="p" cx="1100" cy="30" r="2"/>
  <circle class="p" cx="1140" cy="60" r="1.5" style="animation-delay: 0.5s"/>
  <circle class="p" cx="60" cy="390" r="2" style="animation-delay: 1s"/>
  <circle class="p" cx="1150" cy="380" r="1.8" style="animation-delay: 1.5s"/>

  <!-- ============ SECTION 1: AI & SYSTEMS ============ -->
  <g transform="translate(40, 100)">
    <text class="section-label section-ai" x="0" y="0">AI &amp; Systems</text>
    <line class="hand-underline ul-ai" x1="0" y1="10" x2="200" y2="10"/>

    <!-- Chips -->
    <g transform="translate(0, 30)">
      <g transform="translate(0, 0)">
        <rect class="chip chip-ai" x="0" y="0" width="90" height="32" rx="16"/>
        <text class="chip-text" x="45" y="21" text-anchor="middle">Python</text>
      </g>
      <g transform="translate(100, 0)">
        <rect class="chip chip-ai" x="0" y="0" width="90" height="32" rx="16"/>
        <text class="chip-text" x="45" y="21" text-anchor="middle">FastAPI</text>
      </g>
      <g transform="translate(200, 0)">
        <rect class="chip chip-ai" x="0" y="0" width="110" height="32" rx="16"/>
        <text class="chip-text" x="55" y="21" text-anchor="middle">FastEmbed</text>
      </g>
      <g transform="translate(320, 0)">
        <rect class="chip chip-ai" x="0" y="0" width="90" height="32" rx="16"/>
        <text class="chip-text" x="45" y="21" text-anchor="middle">LanceDB</text>
      </g>
      <g transform="translate(420, 0)">
        <rect class="chip chip-ai" x="0" y="0" width="90" height="32" rx="16"/>
        <text class="chip-text" x="45" y="21" text-anchor="middle">LiteLLM</text>
      </g>
      <g transform="translate(520, 0)">
        <rect class="chip chip-ai" x="0" y="0" width="100" height="32" rx="16"/>
        <text class="chip-text" x="50" y="21" text-anchor="middle">FlashRank</text>
      </g>
      <g transform="translate(630, 0)">
        <rect class="chip chip-ai" x="0" y="0" width="110" height="32" rx="16"/>
        <text class="chip-text" x="55" y="21" text-anchor="middle">Claude API</text>
      </g>
      <g transform="translate(750, 0)">
        <rect class="chip chip-ai" x="0" y="0" width="90" height="32" rx="16"/>
        <text class="chip-text" x="45" y="21" text-anchor="middle">Docker</text>
      </g>
      <g transform="translate(850, 0)">
        <rect class="chip chip-ai" x="0" y="0" width="70" height="32" rx="16"/>
        <text class="chip-text" x="35" y="21" text-anchor="middle">Linux</text>
      </g>
    </g>
  </g>

  <!-- ============ SECTION 2: DAY JOB ============ -->
  <g transform="translate(40, 200)">
    <text class="section-label section-web" x="0" y="0">Day Job</text>
    <line class="hand-underline ul-web" x1="0" y1="10" x2="130" y2="10"/>

    <g transform="translate(0, 30)">
      <g transform="translate(0, 0)">
        <rect class="chip chip-web" x="0" y="0" width="60" height="32" rx="16"/>
        <text class="chip-text" x="30" y="21" text-anchor="middle">C#</text>
      </g>
      <g transform="translate(70, 0)">
        <rect class="chip chip-web" x="0" y="0" width="80" height="32" rx="16"/>
        <text class="chip-text" x="40" y="21" text-anchor="middle">.NET</text>
      </g>
      <g transform="translate(160, 0)">
        <rect class="chip chip-web" x="0" y="0" width="90" height="32" rx="16"/>
        <text class="chip-text" x="45" y="21" text-anchor="middle">Angular</text>
      </g>
      <g transform="translate(260, 0)">
        <rect class="chip chip-web" x="0" y="0" width="110" height="32" rx="16"/>
        <text class="chip-text" x="55" y="21" text-anchor="middle">TypeScript</text>
      </g>
      <g transform="translate(380, 0)">
        <rect class="chip chip-web" x="0" y="0" width="100" height="32" rx="16"/>
        <text class="chip-text" x="50" y="21" text-anchor="middle">SQL Server</text>
      </g>
      <g transform="translate(490, 0)">
        <rect class="chip chip-web" x="0" y="0" width="90" height="32" rx="16"/>
        <text class="chip-text" x="45" y="21" text-anchor="middle">Firebase</text>
      </g>
      <g transform="translate(590, 0)">
        <rect class="chip chip-web" x="0" y="0" width="80" height="32" rx="16"/>
        <text class="chip-text" x="40" y="21" text-anchor="middle">HTML/CSS</text>
      </g>
    </g>
  </g>

  <!-- ============ SECTION 3: ALSO KNOW ============ -->
  <g transform="translate(40, 300)">
    <text class="section-label section-past" x="0" y="0">Also Know</text>
    <line class="hand-underline ul-past" x1="0" y1="10" x2="160" y2="10"/>

    <g transform="translate(0, 30)">
      <g transform="translate(0, 0)">
        <rect class="chip chip-past" x="0" y="0" width="60" height="32" rx="16"/>
        <text class="chip-text" x="30" y="21" text-anchor="middle">C</text>
      </g>
      <g transform="translate(70, 0)">
        <rect class="chip chip-past" x="0" y="0" width="60" height="32" rx="16"/>
        <text class="chip-text" x="30" y="21" text-anchor="middle">C++</text>
      </g>
      <g transform="translate(140, 0)">
        <rect class="chip chip-past" x="0" y="0" width="70" height="32" rx="16"/>
        <text class="chip-text" x="35" y="21" text-anchor="middle">Dart</text>
      </g>
      <g transform="translate(220, 0)">
        <rect class="chip chip-past" x="0" y="0" width="80" height="32" rx="16"/>
        <text class="chip-text" x="40" y="21" text-anchor="middle">Flutter</text>
      </g>
      <g transform="translate(310, 0)">
        <rect class="chip chip-past" x="0" y="0" width="80" height="32" rx="16"/>
        <text class="chip-text" x="40" y="21" text-anchor="middle">React</text>
      </g>
      <g transform="translate(400, 0)">
        <rect class="chip chip-past" x="0" y="0" width="90" height="32" rx="16"/>
        <text class="chip-text" x="45" y="21" text-anchor="middle">Bash</text>
      </g>
      <g transform="translate(500, 0)">
        <rect class="chip chip-past" x="0" y="0" width="60" height="32" rx="16"/>
        <text class="chip-text" x="30" y="21" text-anchor="middle">Git</text>
      </g>
    </g>
  </g>
</svg>
