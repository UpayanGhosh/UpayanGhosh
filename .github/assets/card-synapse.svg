<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-label="Synapse-OSS">
  <title>Synapse-OSS — Self-hosted AI with hybrid memory</title>
  <defs>
    <linearGradient id="sBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1040"/>
      <stop offset="100%" stop-color="#3d1a78"/>
    </linearGradient>
    <linearGradient id="sAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9F6BF5"/>
      <stop offset="100%" stop-color="#c9b8ff"/>
    </linearGradient>
    <filter id="sGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style><![CDATA[
    @keyframes pulse { 0%,100%{opacity:0.6;transform:scale(1);} 50%{opacity:1;transform:scale(1.1);} }
    @keyframes shimmer { 0%,100%{opacity:1;} 50%{opacity:0.85;} }
    @keyframes float-dot {
      0%,100% { transform: translate(0,0); opacity: 0.4; }
      50% { transform: translate(4px,-8px); opacity: 0.9; }
    }
    @keyframes neuron {
      0%,100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .title { font-family: 'Segoe UI','SF Pro Display','Helvetica Neue',sans-serif; font-size: 28px; font-weight: 700; fill: url(#sAccent); animation: shimmer 4s infinite; }
    .tag { font-family: 'Fira Code','Courier New',monospace; font-size: 11px; font-weight: 600; fill: #c9b8ff; }
    .desc { font-family: 'Segoe UI',sans-serif; font-size: 13px; fill: #e4d9ff; }
    .sub { font-family: 'Segoe UI',sans-serif; font-size: 11px; fill: #9F6BF5; }
    .brain-core { fill: #9F6BF5; animation: pulse 3s ease-in-out infinite; transform-origin: 70px 140px; filter: url(#sGlow); }
    .neuron { stroke: #c9b8ff; stroke-width: 1.5; stroke-linecap: round; fill: none; animation: neuron 2s ease-in-out infinite; }
    .p { fill: #c9b8ff; animation: float-dot 3s ease-in-out infinite; }
    .pill { fill: rgba(159,107,245,0.18); stroke: #9F6BF5; stroke-width: 1; }
  ]]></style>

  <!-- Card background with shadow -->
  <rect x="4" y="4" width="592" height="292" rx="20" ry="20" fill="url(#sBg)" filter="url(#sShadow)"/>
  <rect x="4" y="4" width="592" height="292" rx="20" ry="20" fill="none" stroke="#9F6BF5" stroke-width="1.5" opacity="0.5"/>

  <!-- Accent stripe on left -->
  <rect x="4" y="4" width="5" height="292" rx="2" fill="url(#sAccent)"/>

  <!-- Floating particles -->
  <circle class="p" cx="540" cy="40" r="2"/>
  <circle class="p" cx="560" cy="80" r="1.5" style="animation-delay: 0.5s"/>
  <circle class="p" cx="520" cy="60" r="2.5" style="animation-delay: 1s"/>
  <circle class="p" cx="570" cy="30" r="1.5" style="animation-delay: 1.5s"/>
  <circle class="p" cx="480" cy="50" r="2" style="animation-delay: 0.8s"/>
  <circle class="p" cx="30" cy="270" r="2" style="animation-delay: 2s"/>
  <circle class="p" cx="50" cy="250" r="1.5" style="animation-delay: 0.3s"/>

  <!-- Brain icon (stylized neural network) -->
  <g transform="translate(70, 140)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#6E40C9" stroke-width="1.5" opacity="0.4"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="32" fill="none" stroke="#9F6BF5" stroke-width="1" opacity="0.6"/>
    <!-- Neural connections -->
    <path class="neuron" d="M -25 -15 Q 0 -5 25 -15" style="animation-delay: 0s"/>
    <path class="neuron" d="M -25 15 Q 0 5 25 15" style="animation-delay: 0.4s"/>
    <path class="neuron" d="M -20 -25 Q 0 0 20 25" style="animation-delay: 0.8s"/>
    <path class="neuron" d="M 20 -25 Q 0 0 -20 25" style="animation-delay: 1.2s"/>
    <!-- Nodes -->
    <circle cx="-25" cy="-15" r="3" fill="#c9b8ff"/>
    <circle cx="25" cy="-15" r="3" fill="#c9b8ff"/>
    <circle cx="-25" cy="15" r="3" fill="#c9b8ff"/>
    <circle cx="25" cy="15" r="3" fill="#c9b8ff"/>
    <circle cx="-20" cy="-25" r="2.5" fill="#c9b8ff"/>
    <circle cx="20" cy="-25" r="2.5" fill="#c9b8ff"/>
    <circle cx="-20" cy="25" r="2.5" fill="#c9b8ff"/>
    <circle cx="20" cy="25" r="2.5" fill="#c9b8ff"/>
    <!-- Core -->
    <circle class="brain-core" cx="0" cy="0" r="8"/>
  </g>

  <!-- Title -->
  <text class="title" x="150" y="85">Synapse-OSS</text>
  <text class="sub" x="150" y="105">self-hosted · privacy-first · multi-channel</text>

  <!-- Description -->
  <text class="desc" x="150" y="140">AI assistant with hybrid memory &amp; evolving</text>
  <text class="desc" x="150" y="158">personality. Runs locally. Remembers you.</text>
  <text class="desc" x="150" y="176">WhatsApp · Telegram · Discord · Slack</text>

  <!-- Tech pills -->
  <g transform="translate(150, 200)">
    <rect class="pill" x="0" y="0" width="60" height="22" rx="11"/>
    <text class="tag" x="30" y="15" text-anchor="middle">Python</text>

    <rect class="pill" x="68" y="0" width="62" height="22" rx="11"/>
    <text class="tag" x="99" y="15" text-anchor="middle">FastAPI</text>

    <rect class="pill" x="138" y="0" width="76" height="22" rx="11"/>
    <text class="tag" x="176" y="15" text-anchor="middle">FastEmbed</text>

    <rect class="pill" x="222" y="0" width="70" height="22" rx="11"/>
    <text class="tag" x="257" y="15" text-anchor="middle">LanceDB</text>
  </g>

  <!-- Bottom stats line -->
  <g transform="translate(150, 248)">
    <!-- Star icon -->
    <path d="M 6 0 L 7.5 4.5 L 12 4.5 L 8.5 7.5 L 10 12 L 6 9 L 2 12 L 3.5 7.5 L 0 4.5 L 4.5 4.5 Z" fill="#FFE066"/>
    <text class="sub" x="18" y="10" style="fill:#FFE066">Featured project</text>
    <text class="sub" x="140" y="10">→ github.com/UpayanGhosh/Synapse-OSS</text>
  </g>
</svg>
