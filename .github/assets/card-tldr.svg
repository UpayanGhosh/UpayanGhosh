<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" width="600" height="300" role="img" aria-label="tldr-skill">
  <title>tldr-skill — Any codebase, explained</title>
  <defs>
    <linearGradient id="tBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2818"/>
      <stop offset="100%" stop-color="#00471B"/>
    </linearGradient>
    <linearGradient id="tAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3FB950"/>
      <stop offset="100%" stop-color="#a8e6b0"/>
    </linearGradient>
    <filter id="tGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="tShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <style><![CDATA[
    @keyframes shimmer { 0%,100%{opacity:1;} 50%{opacity:0.85;} }
    @keyframes float-dot {
      0%,100% { transform: translate(0,0); opacity: 0.4; }
      50% { transform: translate(4px,-8px); opacity: 0.9; }
    }
    @keyframes node-pulse {
      0%,100% { r: 3; opacity: 0.6; }
      50% { r: 4.5; opacity: 1; }
    }
    @keyframes line-flow {
      from { stroke-dashoffset: 0; }
      to { stroke-dashoffset: -20; }
    }
    .title { font-family: 'Segoe UI','SF Pro Display',sans-serif; font-size: 28px; font-weight: 700; fill: url(#tAccent); animation: shimmer 4s infinite; }
    .tag { font-family: 'Fira Code',monospace; font-size: 11px; font-weight: 600; fill: #a8e6b0; }
    .desc { font-family: 'Segoe UI',sans-serif; font-size: 13px; fill: #d4f0d4; }
    .sub { font-family: 'Segoe UI',sans-serif; font-size: 11px; fill: #3FB950; }
    .node { fill: #3FB950; animation: node-pulse 2.5s ease-in-out infinite; filter: url(#tGlow); }
    .edge { stroke: #a8e6b0; stroke-width: 1.2; fill: none; stroke-dasharray: 3 3; animation: line-flow 2s linear infinite; }
    .p { fill: #a8e6b0; animation: float-dot 3s ease-in-out infinite; }
    .pill { fill: rgba(63,185,80,0.18); stroke: #3FB950; stroke-width: 1; }
  ]]></style>

  <!-- Card background -->
  <rect x="4" y="4" width="592" height="292" rx="20" ry="20" fill="url(#tBg)" filter="url(#tShadow)"/>
  <rect x="4" y="4" width="592" height="292" rx="20" ry="20" fill="none" stroke="#3FB950" stroke-width="1.5" opacity="0.5"/>

  <!-- Accent stripe on left -->
  <rect x="4" y="4" width="5" height="292" rx="2" fill="url(#tAccent)"/>

  <!-- Floating particles -->
  <circle class="p" cx="540" cy="40" r="2"/>
  <circle class="p" cx="560" cy="80" r="1.5" style="animation-delay: 0.5s"/>
  <circle class="p" cx="520" cy="60" r="2.5" style="animation-delay: 1s"/>
  <circle class="p" cx="570" cy="30" r="1.5" style="animation-delay: 1.5s"/>
  <circle class="p" cx="480" cy="50" r="2" style="animation-delay: 0.8s"/>
  <circle class="p" cx="40" cy="260" r="2" style="animation-delay: 1.2s"/>
  <circle class="p" cx="60" cy="240" r="1.5" style="animation-delay: 2s"/>

  <!-- Dependency graph icon -->
  <g transform="translate(70, 140)">
    <circle cx="0" cy="0" r="48" fill="none" stroke="#008000" stroke-width="1.5" opacity="0.4"/>

    <!-- Graph edges -->
    <line class="edge" x1="0" y1="0" x2="-30" y2="-25"/>
    <line class="edge" x1="0" y1="0" x2="30" y2="-25"/>
    <line class="edge" x1="0" y1="0" x2="-30" y2="25"/>
    <line class="edge" x1="0" y1="0" x2="30" y2="25"/>
    <line class="edge" x1="-30" y1="-25" x2="30" y2="-25"/>
    <line class="edge" x1="-30" y1="25" x2="30" y2="25"/>
    <line class="edge" x1="-30" y1="-25" x2="-30" y2="25"/>
    <line class="edge" x1="30" y1="-25" x2="30" y2="25"/>

    <!-- Nodes -->
    <circle class="node" cx="0" cy="0" r="5" style="animation-delay: 0s"/>
    <circle class="node" cx="-30" cy="-25" r="4" style="animation-delay: 0.3s"/>
    <circle class="node" cx="30" cy="-25" r="4" style="animation-delay: 0.6s"/>
    <circle class="node" cx="-30" cy="25" r="4" style="animation-delay: 0.9s"/>
    <circle class="node" cx="30" cy="25" r="4" style="animation-delay: 1.2s"/>
  </g>

  <!-- Title -->
  <text class="title" x="150" y="85">tldr-skill</text>
  <text class="sub" x="150" y="105">any codebase → interactive website · 2 words</text>

  <!-- Description -->
  <text class="desc" x="150" y="140">Point it at any repo. Get a living explainer</text>
  <text class="desc" x="150" y="158">site with dep graphs, diagrams, and search.</text>
  <text class="desc" x="150" y="176">No external deps · dark mode · mobile-ready</text>

  <!-- Tech pills -->
  <g transform="translate(150, 200)">
    <rect class="pill" x="0" y="0" width="86" height="22" rx="11"/>
    <text class="tag" x="43" y="15" text-anchor="middle">Claude Code</text>

    <rect class="pill" x="94" y="0" width="52" height="22" rx="11"/>
    <text class="tag" x="120" y="15" text-anchor="middle">D3.js</text>

    <rect class="pill" x="154" y="0" width="86" height="22" rx="11"/>
    <text class="tag" x="197" y="15" text-anchor="middle">Cytoscape.js</text>

    <rect class="pill" x="248" y="0" width="60" height="22" rx="11"/>
    <text class="tag" x="278" y="15" text-anchor="middle">Mermaid</text>
  </g>

  <!-- Bottom stats line -->
  <g transform="translate(150, 248)">
    <path d="M 6 0 L 7.5 4.5 L 12 4.5 L 8.5 7.5 L 10 12 L 6 9 L 2 12 L 3.5 7.5 L 0 4.5 L 4.5 4.5 Z" fill="#FFE066"/>
    <text class="sub" x="18" y="10" style="fill:#FFE066">Featured project</text>
    <text class="sub" x="140" y="10">→ github.com/UpayanGhosh/tldr-skill</text>
  </g>
</svg>
