<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="UpayanGhosh — AI Systems Engineer">
  <title>UpayanGhosh — AI Systems Engineer</title>
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117">
        <animate attributeName="stop-color" values="#0d1117;#1a1040;#0d1117" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#1a1040">
        <animate attributeName="stop-color" values="#1a1040;#3d1a78;#1a1040" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#2d1458">
        <animate attributeName="stop-color" values="#2d1458;#6E40C9;#2d1458" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e4d9ff"/>
      <stop offset="80%" stop-color="#c9b8ff"/>
      <stop offset="100%" stop-color="#9F6BF5"/>
    </linearGradient>

    <linearGradient id="handGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFE066"/>
    </linearGradient>

    <radialGradient id="spotlight" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#9F6BF5" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#9F6BF5" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style><![CDATA[
    /* Title hierarchy */
    .title {
      font-family: 'Segoe UI', 'SF Pro Display', 'Helvetica Neue', 'Inter', sans-serif;
      font-size: 88px;
      font-weight: 800;
      letter-spacing: -3px;
      fill: url(#titleGrad);
    }

    .handwritten-big {
      font-family: 'Caveat', 'Kalam', 'Bradley Hand', 'Segoe Script', 'Chalkboard SE', 'Comic Sans MS', cursive;
      font-size: 44px;
      font-weight: 700;
      fill: url(#handGrad);
    }

    .handwritten-med {
      font-family: 'Caveat', 'Kalam', 'Bradley Hand', 'Segoe Script', 'Chalkboard SE', cursive;
      font-size: 26px;
      font-weight: 600;
      fill: #FFE066;
    }

    .handwritten-small {
      font-family: 'Caveat', 'Kalam', 'Bradley Hand', 'Segoe Script', cursive;
      font-size: 22px;
      font-weight: 700;
      fill: #FFE066;
    }

    .subtitle {
      font-family: 'Segoe UI', 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 500;
      fill: #c9b8ff;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .divider-text {
      font-family: 'Segoe UI', 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      fill: #9F6BF5;
      letter-spacing: 2px;
    }

    /* Animations */
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.9; filter: brightness(1.15); }
    }
    .title { animation: shimmer 5s ease-in-out infinite; }

    @keyframes wiggle {
      0%, 100% { transform: rotate(-6deg); }
      50% { transform: rotate(-4deg); }
    }
    .handwritten-big { animation: shimmer 4s ease-in-out infinite; }

    @keyframes cursor-blink {
      0%, 49% { opacity: 1; }
      50%, 100% { opacity: 0; }
    }
    .cursor { fill: #9F6BF5; animation: cursor-blink 1s steps(2) infinite; }

    @keyframes float-a {
      0%, 100% { transform: translate(0, 0); opacity: 0.3; }
      50% { transform: translate(12px, -18px); opacity: 0.9; }
    }
    @keyframes float-b {
      0%, 100% { transform: translate(0, 0); opacity: 0.2; }
      50% { transform: translate(-15px, 12px); opacity: 0.7; }
    }
    @keyframes float-c {
      0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.4; }
      50% { transform: translate(-10px, -20px) scale(1.4); opacity: 1; }
    }

    .p1 { animation: float-a 7s ease-in-out infinite; fill: #9F6BF5; transform-origin: center; }
    .p2 { animation: float-b 9s ease-in-out infinite; fill: #c9b8ff; transform-origin: center; }
    .p3 { animation: float-c 8s ease-in-out infinite; fill: #6E40C9; transform-origin: center; }

    @keyframes pulse-orb {
      0%, 100% { r: 4; opacity: 0.6; }
      50% { r: 8; opacity: 1; }
    }
    .orb { animation: pulse-orb 3s ease-in-out infinite; fill: #9F6BF5; filter: url(#glow); }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .ring-outer {
      fill: none;
      stroke: #6E40C9;
      stroke-width: 1.5;
      stroke-dasharray: 8 14;
      animation: rotate 25s linear infinite;
      transform-origin: center;
    }
    .ring-inner {
      fill: none;
      stroke: #9F6BF5;
      stroke-width: 1;
      stroke-dasharray: 4 10;
      animation: rotate 18s linear infinite reverse;
      transform-origin: center;
      opacity: 0.6;
    }

    /* Drawing animation for arrows */
    @keyframes draw {
      from { stroke-dashoffset: 150; }
      to { stroke-dashoffset: 0; }
    }
    .arrow {
      fill: none;
      stroke: #FFE066;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 150;
      stroke-dashoffset: 0;
      animation: draw 3s ease-out infinite alternate;
    }

    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: 1; transform: scale(1.2); }
    }
    .sparkle { fill: #FFFACD; animation: sparkle 2s ease-in-out infinite; transform-origin: center; }

    /* Subtitle letters stagger */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  ]]></style>

  <!-- Base background -->
  <rect width="1200" height="360" fill="url(#bgGrad)"/>

  <!-- Spotlight glow -->
  <circle cx="600" cy="150" r="400" fill="url(#spotlight)"/>

  <!-- Grid texture -->
  <g opacity="0.06" stroke="#9F6BF5" stroke-width="0.8">
    <line x1="0" y1="90" x2="1200" y2="90"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="600" y1="0" x2="600" y2="360"/>
    <line x1="800" y1="0" x2="800" y2="360"/>
    <line x1="1000" y1="0" x2="1000" y2="360"/>
  </g>

  <!-- Particles (lots of them) -->
  <circle class="p1" cx="80"  cy="60"  r="2.5"/>
  <circle class="p2" cx="140" cy="140" r="2"/>
  <circle class="p3" cx="60"  cy="220" r="3"/>
  <circle class="p1" cx="180" cy="300" r="2"/>
  <circle class="p2" cx="220" cy="80"  r="1.8"/>
  <circle class="p3" cx="90"  cy="320" r="2.5"/>
  <circle class="p1" cx="260" cy="200" r="2.2"/>
  <circle class="p2" cx="130" cy="50"  r="1.5"/>
  <circle class="p3" cx="40"  cy="130" r="2.8"/>

  <circle class="p1" cx="1020" cy="60"  r="2.5"/>
  <circle class="p2" cx="1120" cy="140" r="2"/>
  <circle class="p3" cx="1060" cy="220" r="3"/>
  <circle class="p1" cx="1140" cy="300" r="2"/>
  <circle class="p2" cx="980"  cy="80"  r="1.8"/>
  <circle class="p3" cx="1110" cy="40"  r="2.5"/>
  <circle class="p1" cx="940"  cy="200" r="2.2"/>
  <circle class="p2" cx="1160" cy="50"  r="1.5"/>
  <circle class="p3" cx="1080" cy="320" r="2.8"/>

  <!-- Left decorative rings -->
  <g transform="translate(150, 180)">
    <circle class="ring-outer" cx="0" cy="0" r="75"/>
    <circle class="ring-inner" cx="0" cy="0" r="55"/>
    <circle class="orb" cx="0" cy="0" r="5"/>
    <!-- Inner network -->
    <circle cx="-30" cy="-18" r="3" fill="#c9b8ff" opacity="0.8"/>
    <circle cx="30"  cy="-18" r="3" fill="#c9b8ff" opacity="0.8"/>
    <circle cx="-30" cy="18"  r="3" fill="#c9b8ff" opacity="0.8"/>
    <circle cx="30"  cy="18"  r="3" fill="#c9b8ff" opacity="0.8"/>
    <line x1="-30" y1="-18" x2="30"  y2="18"  stroke="#9F6BF5" stroke-width="1" opacity="0.4"/>
    <line x1="30"  y1="-18" x2="-30" y2="18"  stroke="#9F6BF5" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="-18" x2="30"  y2="-18" stroke="#9F6BF5" stroke-width="1" opacity="0.4"/>
    <line x1="-30" y1="18"  x2="30"  y2="18"  stroke="#9F6BF5" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Right decorative rings -->
  <g transform="translate(1050, 180)">
    <circle class="ring-outer" cx="0" cy="0" r="75"/>
    <circle class="ring-inner" cx="0" cy="0" r="55"/>
    <circle class="orb" cx="0" cy="0" r="5"/>
    <!-- Inner hexagon -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="none" stroke="#9F6BF5" stroke-width="1.5" opacity="0.6"/>
    <circle cx="0" cy="-30" r="3" fill="#c9b8ff"/>
    <circle cx="26" cy="-15" r="3" fill="#c9b8ff"/>
    <circle cx="26" cy="15" r="3" fill="#c9b8ff"/>
    <circle cx="0" cy="30" r="3" fill="#c9b8ff"/>
    <circle cx="-26" cy="15" r="3" fill="#c9b8ff"/>
    <circle cx="-26" cy="-15" r="3" fill="#c9b8ff"/>
  </g>

  <!-- Small eyebrow label above title -->
  <text class="subtitle" x="600" y="90" text-anchor="middle" style="font-size: 14px;">PORTFOLIO  •  OPEN SOURCE  •  BUILDING IN PUBLIC</text>

  <!-- Top and bottom dividers around eyebrow -->
  <line x1="380" y1="85" x2="430" y2="85" stroke="#9F6BF5" stroke-width="1" opacity="0.5"/>
  <line x1="770" y1="85" x2="820" y2="85" stroke="#9F6BF5" stroke-width="1" opacity="0.5"/>

  <!-- Main title: UpayanGhosh -->
  <text class="title" x="600" y="190" text-anchor="middle">UpayanGhosh</text>

  <!-- Subtle divider line under name -->
  <line x1="380" y1="215" x2="820" y2="215" stroke="#9F6BF5" stroke-width="1" opacity="0.3"/>
  <circle cx="600" cy="215" r="3" fill="#9F6BF5"/>

  <!-- Role -->
  <text style="font-family: 'Segoe UI', 'SF Pro Display', 'Inter', sans-serif; font-size: 22px; font-weight: 600; fill: #c9b8ff; letter-spacing: 0.5px;" x="600" y="250" text-anchor="middle">AI Systems Engineer  ·  OSS Builder</text>

  <!-- Handwritten accent tagline (kept subtle) -->
  <text class="handwritten-med" x="600" y="290" text-anchor="middle" style="font-size: 24px; opacity: 0.9;">building AI that remembers you</text>

  <!-- Subtitle tagline -->
  <text class="subtitle" x="600" y="325" text-anchor="middle" style="font-size: 12px;">KOLKATA, INDIA  •  APPLICATION DEV ANALYST @ ACCENTURE</text>

  <!-- Decorative dots on the subtitle line -->
  <circle cx="360" cy="320" r="3" fill="#9F6BF5" opacity="0.8"/>
  <circle cx="840" cy="320" r="3" fill="#9F6BF5" opacity="0.8"/>
</svg>
